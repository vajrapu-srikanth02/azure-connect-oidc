name: Update altf workflow versions

on:
  workflow_dispatch:
    inputs:
      major_version:
        description: "Major version"
        required: true
        default: "26"
      minor_version:
        description: "Minor version"
        required: true
        default: "01"
      file:
        required: true
        description: enter file name
permissions:
  contents: write
  # actions: write
jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.cpr.outputs.pull-request-number }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PATS }}

      - name: Update versions in altf workflows
        run: |
          for file in .github/workflows/${{ inputs.file }}; do
            echo "Updating $file"

            sed -i "s/major_version: '[^']*'/major_version: '${{ github.event.inputs.major_version }}'/" "$file"
            sed -i "s/minor_version: '[^']*'/minor_version: '${{ github.event.inputs.minor_version }}'/" "$file"
            cat .github/workflows/altf-keycloak.yaml
          done

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PATS }}
          branch: update-altf-versions
          title: "Update altf workflow versions"
          commit-message: "Update major_version and minor_version"
          body: |
            This PR updates:
            - major_version → ${{ github.event.inputs.major_version }}
            - minor_version → ${{ github.event.inputs.minor_version }}

  approval:
    runs-on: ubuntu-latest
    needs: update

    environment:
      name: production   # 👈 create this in repo settings
      url: https://github.com/${{ github.repository }}

    steps:
      - name: Waiting for approval
        run: echo "Approved. Ready to merge PR"

  merge:
    runs-on: ubuntu-latest
    needs: approval

    steps:
      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PATS }}
          script: |
            const prNumber = ${{ needs.update.outputs.pr_number }};
            
            if (!prNumber) {
              core.setFailed("PR number not found");
              return;
            }
              
            console.log("Merging PR:", prNumber);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: "squash"
            });