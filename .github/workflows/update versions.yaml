name: Update altf workflow versions

on:
  workflow_dispatch:
    inputs:
      major_version:
        description: "Major version"
        required: true
        default: "26"
      minor_version:
        description: "Minor version"
        required: true
        default: "01"
      file:
        required: true
        description: enter file name
permissions:
  contents: write
env:
  branch_name: 'update-altf-versions-${{ github.run_number }}'
jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.diff.outputs.changes }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PATS }}

      - name: Update versions in altf workflows
        run: |
          for file in .github/workflows/altf-${{ inputs.file }}; do
            echo "Updating $file"

            sed -i "s/major_version: '[^']*'/major_version: '${{ github.event.inputs.major_version }}'/" "$file"
            sed -i "s/minor_version: '[^']*'/minor_version: '${{ github.event.inputs.minor_version }}'/" "$file"
            cat .github/workflows/altf-keycloak.yaml
          done

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Create branch, commit and push
        if: steps.diff.outputs.changes == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git checkout -b ${{ env.branch_name }}
          git add .
          git commit -m "Update major/minor versions"

          git push origin ${{ env.branch_name }}
        env:
          GH_TOKEN: ${{ secrets.GH_PATS }}

      - name: Create PR using GitHub CLI
        if: steps.diff.outputs.changes == 'true'
        run: |
          gh pr create \
            --title "Update altf workflow versions" \
            --body "Updated major_version=${{ inputs.major_version }}, minor_version=${{ inputs.minor_version }}" \
            --head ${{ env.branch_name }} \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GH_PATS }}

      # - name: Create Pull Request
      #   id: cpr
      #   uses: peter-evans/create-pull-request@v6
      #   with:
      #     token: ${{ secrets.GH_PATS }}
      #     branch: ${{ env.branch_name }}
      #     title: "Update altf workflow versions"
      #     commit-message: "Update major_version and minor_version"
      #     body: |
      #       This PR updates:
      #       - major_version → ${{ github.event.inputs.major_version }}
      #       - minor_version → ${{ github.event.inputs.minor_version }}

  approval:
    runs-on: ubuntu-latest
    needs: update
    # if: needs.update.outputs.changes == 'true'

    environment:
      name: production   # 👈 create this in repo settings
      url: https://github.com/${{ github.repository }}

    steps:
      - name: Waiting for approval
        run: echo "Approved. Ready to merge PR"

  merge:
    runs-on: ubuntu-latest
    needs: approval
    # if: needs.update.outputs.changes == 'true'

    steps:
      - name: Checkout repo   # 👈 REQUIRED
        uses: actions/checkout@v4
        with:
          ref: ${{ env.branch_name }}
          token: ${{ secrets.GH_PATS }}

      - name: Get PR number
        id: getpr
        run: |
          PR=$(gh pr list --head ${{ env.branch_name }} --json number -q '.[0].number')
          echo "Found PR: $PR"
          echo "pr_number=$PR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GH_PATS }}

      - name: Merge PR
        run: |
          if [ -z "${{ steps.getpr.outputs.pr_number }}" ]; then
            echo "No PR found. Skipping merge."
            exit 0
          fi

          gh pr merge ${{ steps.getpr.outputs.pr_number }} --squash --admin
        env:
          GH_TOKEN: ${{ secrets.GH_PATS }}