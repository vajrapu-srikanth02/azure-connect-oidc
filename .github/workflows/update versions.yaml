name: Update altf workflow versions

on:
  workflow_dispatch:
    inputs:
      major_version:
        description: "Major version"
        required: true
        default: "26"
      minor_version:
        description: "Minor version"
        required: true
        default: "01"
      file:
        required: true
        description: enter file name
permissions:
  contents: write
  actions: write
jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update versions in altf workflows
        run: |
          for file in .github/workflows/${{ inputs.file }}; do
            echo "Updating $file"

            yq -i '
              (.jobs[]?.with.major_version) = "'"${{ github.event.inputs.major_version }}"'" |
              (.jobs[]?.with.minor_version) = "'"${{ github.event.inputs.minor_version }}"'"
            ' "$file"
            cat .github/workflows/altf-keycloak.yaml
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: 
          branch: update-altf-versions
          title: "Update altf workflow versions"
          commit-message: "Update major_version and minor_version"
          body: |
            This PR updates:
            - major_version → ${{ github.event.inputs.major_version }}
            - minor_version → ${{ github.event.inputs.minor_version }}